name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Test Backend API
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: node index.js &
        env:
          PORT: 3000

      - name: Wait for server to be ready
        run: sleep 5

      # 1. Health Check
      - name: Health Check
        run: |
          curl --fail http://localhost:3000/api/health

      # 2. Login Admin y guardar token
      - name: Login Admin
        run: |
          TOKEN=$(curl --fail -s -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email": "${{ secrets.ADMIN_EMAIL }}", "password": "${{ secrets.ADMIN_PASSWORD }}"}' \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          echo "API_TOKEN=$TOKEN" >> $GITHUB_ENV

      # 3. Listar Equipos
      - name: Listar Equipos
        run: |
          curl --fail http://localhost:3000/api/teams \
            -H "Authorization: Bearer ${{ env.API_TOKEN }}"

      # 4. Crear Equipo y guardar ID
      - name: Crear Equipo
        run: |
          TEAM_ID=$(curl --fail -s -X POST http://localhost:3000/api/teams \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ env.API_TOKEN }}" \
            -d '{"name": "Equipo Test CI"}' \
            | grep -o '"id":[0-9]*' | cut -d':' -f2)
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV

      # 5. Eliminar Equipo creado
      - name: Eliminar Equipo
        run: |
          curl --fail -X DELETE http://localhost:3000/api/teams/${{ env.TEAM_ID }} \
            -H "Authorization: Bearer ${{ env.API_TOKEN }}"

  test-frontend:
    name: Verify Frontend Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verificar archivos frontend
        run: |
          echo "Verificando archivos del frontend..."
          ls ./frontend
          test -f ./frontend/index.html && echo "index.html encontrado" || echo "ADVERTENCIA: index.html no encontrado"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to production
        run: echo "Aquí va tu comando de despliegue"
